<div class="apod-hero" [ngClass]="{ loading: loading, error: error }">
  <div class="hero-content">
    <div class="hero-header" [@fadeInUp]>
      <h1>{{ apod?.title }}</h1>
      <p class="hero-date">{{ formatDate(apod?.date) }}</p>
      <p class="hero-copyright">{{ apod?.copyright }}</p>
    </div>

    <div class="hero-media" [ngClass]="{ 'no-media': !apod?.url }">
      <button
        *ngIf="apod?.url && !loading"
        (click)="openLink(apod.url)"
        class="btn-primary">
        Apodi {{ apod?.mediaType }}
      </button>
    </div>

    <div class="hero-actions">
      <button (click)="loadPrevious()" class="btn-secondary" [disabled]="loading">
        &larr; Precedente
      </button>
      <button (click)="loadNext()" class="btn-secondary" [disabled]="loading">
        Successivo &rarr;
      </button>
    </div>

    <button (click)="showExplanation()" class="btn-explanation" [disabled]="loading || !apod">
      Mostra Explanation &darr;
    </button>
  </div>

  <div *ngIf="explanationPanel" class="explanation-panel" [@slideUp]>
    <h3>Explanation</h3>
    <p [innerHTML]="explanationPanel"></p>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
    <button (click)="refresh()" class="btn-secondary">Riprova</button>
  </div>
</div>
